<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>工程題庫拼裝工具 - 完整分類回復版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f1f5f9; padding: 40px; color: #1e293b; }
        .container { max-width: 750px; margin: 0 auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        h2 { color: #1d4ed8; border-bottom: 4px solid #dbeafe; padding-bottom: 15px; margin-bottom: 25px; text-align: center; }
        .status-box { background: #f0fdf4; padding: 18px; border-radius: 12px; font-size: 14px; color: #166534; border-left: 6px solid #22c55e; margin-bottom: 25px; }
        button { width: 100%; padding: 18px; background: #1d4ed8; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1e40af; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 完整分類拼裝器 (1-2878)</h2>
    <div class="status-box">
        ✅ <b>100% 分類找回</b>：包含電梯、消防、電氣等所有單元。<br>
        ✅ <b>精準解析</b>：僅針對 403-598 進行深度標註。
    </div>
    
    <input type="file" id="fileInput" accept=".js">
    <button onclick="processData()">執行最終拼裝並下載 quiz_data.js</button>
</div>

<script>
    // 這是您的完整 16 個單元分類表，絕不再漏掉
    const UNIT_RANGES = [
        [1, 222, "單元二：第二章 品質管理統計分析與手法(一)"],
        [223, 402, "單元二：第二章 品質管理統計分析與手法(二)"],
        [403, 598, "單元二：第一章 監造計畫與品質計畫指導"],
        [599, 797, "單元二：第五、六章 履約管理與工程進度管控"],
        [798, 1123, "單元三：工程相關法令與缺失實務"],
        [1124, 1221, "單元二：第七章 工程界面整合與管理"],
        [1222, 1382, "單元五：第五章 電梯與升降設備品質管理實務"],
        [1383, 1652, "單元五：第三、四章 消防與空調設備品質管理實務"],
        [1653, 1820, "單元五：第二章 給排水與衛生設備品質管理實務"],
        [1821, 2052, "單元五：第六、七章 弱電監控與儀控系統品質管理實務"],
        [2053, 2194, "單元五：第一章 電氣設備品質管理實務"],
        [2195, 2385, "單元二：第八章 品質稽核"],
        [2386, 2606, "單元二：第三章 施工管制與檢驗"],
        [2607, 2836, "單元二：第四章 工程進料檢驗與管制"],
        [2837, 2866, "單元一：第一章 公共工程施工品質管理制度理念與導入"],
        [2867, 2878, "單元一：第二章 政府採購全生命週期概論"]
    ];

    function getSpecialNote(qid, qText) {
        // 嚴格鎖定 403-598，其餘不寫入任何 note
        if (qid < 403 || qid > 598) return "";

        // --- 403-598 專項解析內容 ---
        if (qText.includes("不合格品") || qText.includes("自主檢查")) {
            return "筆記：屬「品質計畫」(廠商)。監造計畫則是審核這些項目。";
        }
        if (qText.includes("監造計畫") && qText.includes("規模")) return "數值：基準規模為 2,000 萬元。";
        if (qText.includes("開工前")) return "時機：計畫書應於「開工前」核定。";
        if (qText.includes("H點") || qText.includes("限止點") || qText.includes("停留點")) {
            return "重點：H點(限止點) = 未經監造檢查合格不得繼續。";
        }
        if (qText.includes("分項") && qText.includes("時機")) return "時機：分項計畫於該項工程「施工前」核定。";
        if (qText.includes("品管人員")) {
            if (qText.includes("專職")) return "法規：1,000萬以上專職；2億以上3人。";
            return "職掌：統計分析、內部稽核、自主檢查表核章。";
        }
        if (qText.includes("工地主任")) return "職掌：施工指導、安全維護、解決技術問題。";
        if (qText.includes("專任工程人員")) return "職掌：督察按圖施工、解決重大問題、簽認文件。";
        if (qText.includes("穿樑") || qText.includes("間距")) return "規範：中心間距應大於 3D。";
        if (qText.includes("軟鐵線")) return "規範：固定間距 1 公尺。";
        if (qText.includes("高度") && qText.includes("電表")) return "數據：1.5 ~ 2 公尺以上。";
        if (qText.includes("重複")) return "規定：重複 3 次以上缺失應設為 H 點。";
        
        // 測試定義
        if (qText.includes("測試")) {
            if (qText.includes("單機")) return "定義：單具設備獨立測試。";
            if (qText.includes("系統")) return "定義：管路儀控組裝完成測試。";
            if (qText.includes("整體")) return "定義：跨介面連結測試。";
        }

        return ""; 
    }

    function processData() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files.length) return alert("請選擇檔案！");
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let jsonStr = e.target.result;
                let start = jsonStr.indexOf('[');
                let end = jsonStr.lastIndexOf(']') + 1;
                let questions = JSON.parse(jsonStr.substring(start, end));
                
                questions.forEach(q => {
                    let idNum = parseInt(q.id);
                    // 恢復所有單元分類
                    for (let [s, ed, name] of UNIT_RANGES) {
                        if (idNum >= s && idNum <= ed) {
                            q.unit = name;
                            break;
                        }
                    }
                    // 僅針對 403-598 寫入 note
                    q.note = getSpecialNote(idNum, q.q);
                });

                let finalContent = "const allQuestions = " + JSON.stringify(questions, null, 2) + ";";
                let blob = new Blob([finalContent], {type: "text/javascript"});
                let url = URL.createObjectURL(blob);
                let a = document.createElement('a');
                a.download = "quiz_data.js";
                a.href = url;
                a.click();
                alert("✨ 1-2878 分類與 403-598 標靶解析已完美合成！");
            } catch (err) { alert("讀取失敗，請確認檔案格式正確。"); }
        };
        reader.readAsText(fileInput.files[0]);
    }
</script>
</body>
</html>
