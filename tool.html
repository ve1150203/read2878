<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>工程題庫拼裝工具 - 極簡精準版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f1f5f9; padding: 40px; color: #1e293b; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #2563eb; border-bottom: 3px solid #eff6ff; padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .info { background: #fff7ed; padding: 15px; border-radius: 10px; font-size: 14px; color: #9a3412; border-left: 5px solid #f97316; margin-bottom: 20px; }
        input[type="file"] { width: 100%; padding: 12px; border: 2px dashed #cbd5e1; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ 題庫精準拼裝器</h2>
    <div class="info">
        <b>💡 解析邏輯：</b><br>
        1. <b>不硬塞：</b> 題目長度短或敘述直觀者，不予解析。<br>
        2. <b>精準打擊：</b> 只針對數值、公式、權責進行標註。<br>
        3. <b>去申論：</b> 刪除所有描述性文字，僅留解題數據。
    </div>
    
    <input type="file" id="fileInput" accept=".js">
    <button onclick="processData()">執行拼裝並下載 quiz_data.js</button>
</div>

<script>
    const UNIT_RANGES = [
        [1, 222, "品質分析手法"], [223, 402, "統計分析手法"], [403, 598, "計畫書編製"],
        [599, 797, "履約管理"], [798, 1123, "相關法規"], [1124, 1221, "界面整合"],
        [1222, 1382, "電梯工程"], [1383, 1652, "消防空調"], [1653, 1820, "給排水"],
        [1821, 2052, "弱電監控"], [2053, 2194, "電氣設備"], [2195, 2385, "品質稽核"],
        [2386, 2606, "施工管制"], [2607, 2836, "進料檢驗"], [2837, 2878, "制度理念"]
    ];

    function getSpecialNote(qid, qText) {
        // --- 負面過濾：題目太短或純敘述題不解析 ---
        if (qText.length < 20 && !qText.includes("金額") && !qText.includes("Ω")) return "";

        // --- 1. 計算題與數值 (精確匹配) ---
        if (qText.includes("機率") || qText.includes("涵蓋")) return "±1σ=68.26%, ±2σ=95.44%, ±3σ=99.73%";
        if (qText.includes("Cpk")) return "Cpk = min(Cpu, Cpl)";
        if (qText.includes("絕緣電阻")) {
            if (qText.includes("150V")) return "0.1 MΩ 以上";
            if (qText.includes("300V")) return "0.2 MΩ 以上";
            return "300V~450V：0.4 MΩ";
        }
        if (qText.includes("電壓降")) return "幹線 3%, 支路 5%";
        if (qText.includes("坡度")) return "75mm以下: 1/50, 100mm以上: 1/100";
        if (qText.includes("1.5") && qText.includes("探測器")) return "離出風口 1.5m 以上";
        if (qText.includes("5000") || qText.includes("查核金額")) return "查核金額：5,000 萬元";
        if (qText.includes("150") || qText.includes("公告金額")) return "公告金額：150 萬元";

        // --- 2. 權責與計畫書 (容易混淆點) ---
        if (qText.includes("品質計畫")) {
            if (qText.includes("擬定") || qText.includes("編製")) return "權責：廠商擬定";
            if (qText.includes("不合格品")) return "出自：品質計畫書";
        }
        if (qText.includes("監造計畫")) {
            if (qText.includes("擬定") || qText.includes("編製")) return "權責：監造擬定";
            if (qText.includes("抽驗頻率")) return "出自：監造計畫書";
        }
        if (qText.includes("一級")) return "廠商自主 (自主檢查表)";
        if (qText.includes("二級")) return "監造抽驗 (抽查記錄表)";
        if (qText.includes("三級")) return "機關督導與查核";

        // --- 3. 採購天數 ---
        if (qText.includes("正式驗收") && qText.includes("合格")) return "15 日內發給證明書";
        if (qText.includes("初驗合格")) return "20 日內正式驗收";

        return ""; 
    }

    function processData() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files.length) return alert("請選擇檔案！");
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let jsonStr = e.target.result;
                let start = jsonStr.indexOf('[');
                let end = jsonStr.lastIndexOf(']') + 1;
                let questions = JSON.parse(jsonStr.substring(start, end));
                
                questions.forEach(q => {
                    let idNum = parseInt(q.id);
                    for (let [s, ed, name] of UNIT_RANGES) {
                        if (idNum >= s && idNum <= ed) { q.unit = name; break; }
                    }
                    q.note = getSpecialNote(idNum, q.q);
                });

                let finalContent = "const allQuestions = " + JSON.stringify(questions, null, 2) + ";";
                let blob = new Blob([finalContent], {type: "text/javascript"});
                let url = URL.createObjectURL(blob);
                let a = document.createElement('a');
                a.download = "quiz_data.js";
                a.href = url;
                a.click();
            } catch (err) { alert("檔案格式不符，請確認是 quiz_data.js"); }
        };
        reader.readAsText(fileInput.files[0]);
    }
</script>
</body>
</html>
