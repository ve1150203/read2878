<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>工程題庫拼裝工具 - 403-598 標靶版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f1f5f9; padding: 40px; color: #1e293b; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #2563eb; border-bottom: 3px solid #eff6ff; padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .target-box { background: #eff6ff; padding: 15px; border-radius: 10px; font-size: 14px; color: #1e40af; border-left: 5px solid #3b82f6; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 403-598 專項解析拼裝器</h2>
    <div class="target-box">
        <b>本次強化單元：監造計畫與品質計畫指導</b><br>
        ● 解析重點：計畫書章節、權責歸屬（監造 vs 廠商）、法規數據。
    </div>
    <input type="file" id="fileInput" accept=".js">
    <button onclick="processData()">執行拼裝並下載 quiz_data.js</button>
</div>

<script>
    const UNIT_RANGES = [
        [1, 402, "品質分析與統計"],
        [403, 598, "單元二：第一章 監造計畫與品質計畫指導"],
        [599, 2878, "其他單元"]
    ];

    function getSpecialNote(qid, qText) {
        // 嚴格限制解析範圍
        if (qid < 403 || qid > 598) return "";

        // --- 1. 計畫書歸屬與章節 (403, 408, 416, 499 等) ---
        if (qText.includes("監造計畫") && qText.includes("章節")) {
            if (qText.includes("不合格品")) return "筆記：不合格品管制屬於「品質計畫」(廠商管)而非監造計畫。";
        }
        if (qText.includes("品質計畫") && qText.includes("內容")) {
            if (qText.includes("施工要領")) return "筆記：施工要領、自主檢查表為品質計畫核心；監造計畫則為抽驗標準。";
        }

        // --- 2. 權責與人員 (420-425, 507-513 等) ---
        if (qText.includes("監造人員")) return "權責：審查品質計畫、施工圖、進度、計價，執行施工抽查。";
        if (qText.includes("品管人員")) return "權責：執行內部稽核、統計分析、自主檢查之核章。";
        if (qText.includes("工地主任")) return "權責：施工技術指導、解決問題、維護安全、管理現場組織。";
        if (qText.includes("專任工程人員")) return "權責：督察按圖施工、解決技術問題、簽認重要文件。";

        // --- 3. 法規數據與金額 (405, 514, 515, 598 等) ---
        if (qText.includes("金額") || qText.includes("新臺幣")) {
            if (qText.includes("監造計畫") || qText.includes("品質計畫")) return "數據：基準規模為 2,000 萬元以上。";
            if (qText.includes("專職") || qText.includes("一千萬")) return "規定：1,000 萬元以上品管員需專職；2 億元以上需 3 人。";
        }
        if (qText.includes("電表") || qText.includes("高度")) return "數據：集合式電表離地高度 1.5 ~ 2 公尺以上。";
        if (qText.includes("穿樑") || qText.includes("間距")) return "規範：管路中心間距應大於 3D。";
        if (qText.includes("軟鐵線") && qText.includes("間距")) return "數據：固定間距以 1 公尺最恰當。";

        // --- 4. 流程與時機 (411, 412, 444, 503 等) ---
        if (qText.includes("開工前")) return "時機：監造與品質計畫均需於「開工前」完成核定。";
        if (qText.includes("分項") && qText.includes("時機")) return "時機：分項計畫得於該項工程「施工前」訂定完成。";
        if (qText.includes("H點") || qText.includes("停留點")) return "重點：H點(限止點)未經監造檢查合格，絕對不可繼續。";
        if (qText.includes("重複")) return "規定：缺失重複發生 3 次以上應設為檢驗停留點(H點)。";

        // --- 5. 測試定義 (462-468) ---
        if (qText.includes("運轉測試")) {
            if (qText.includes("單機")) return "定義：單具設備之獨立測試。";
            if (qText.includes("系統")) return "定義：相關管路、電氣儀控組設完成後之測試。";
            if (qText.includes("整體")) return "定義：跨工項介面連結之測試。";
            if (qText.includes("廠驗")) return "定義：設備出貨前於工廠作的測試。";
        }

        return ""; 
    }

    function processData() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files.length) return alert("請選擇檔案！");
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let jsonStr = e.target.result;
                let start = jsonStr.indexOf('[');
                let end = jsonStr.lastIndexOf(']') + 1;
                let questions = JSON.parse(jsonStr.substring(start, end));
                
                questions.forEach(q => {
                    let idNum = parseInt(q.id);
                    for (let [s, ed, name] of UNIT_RANGES) {
                        if (idNum >= s && idNum <= ed) { q.unit = name; break; }
                    }
                    q.note = getSpecialNote(idNum, q.q);
                });

                let finalContent = "const allQuestions = " + JSON.stringify(questions, null, 2) + ";";
                let blob = new Blob([finalContent], {type: "text/javascript"});
                let url = URL.createObjectURL(blob);
                let a = document.createElement('a');
                a.download = "quiz_data.js";
                a.href = url;
                a.click();
                alert("✅ 403-598 標靶解析完成，其餘已清空。");
            } catch (err) { alert("檔案解析失敗！"); }
        };
        reader.readAsText(fileInput.files[0]);
    }
</script>
</body>
</html>
