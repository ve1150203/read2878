<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程題庫-下拉分類讀題版</title>
    <style>
        :root { --primary: #1e40af; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; min-height: 100vh; padding: 20px; padding-bottom: 100px; }
        
        /* 置頂控制列 */
        .header-nav { position: sticky; top: 0; background: white; padding: 12px; z-index: 1000; border-bottom: 2px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* 下拉選單樣式 */
        .filter-row { margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .unit-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 15px; background-color: #fff; color: #334155; cursor: pointer; }

        .tools-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 10px; }
        
        /* 題目樣式 */
        .q-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; margin-bottom: 15px; cursor: pointer; position: relative; }
        .q-meta { color: #64748b; font-size: 0.82rem; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .q-text { font-weight: bold; font-size: 1.1rem; line-height: 1.5; margin-bottom: 12px; display: block; color: #1e293b; }
        .opt { display: block; margin-bottom: 6px; color: #475569; padding: 6px 10px; border-radius: 6px; background: #f8fafc; font-size: 1rem; }
        
        /* 答案區域 */
        .ans-area { margin-top: 12px; padding: 12px; background: #f0fdf4; border-radius: 8px; color: #166534; font-weight: bold; border-left: 5px solid #22c55e; display: none; }
        .ans-area.show { display: block; }

        /* 浮動按鈕 */
        .float-btns { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { width: 55px; height: 55px; border-radius: 50%; border: none; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s; }
        #resume-btn { background: var(--accent); display: none; font-size: 0.8rem; }
        #top-btn { background: var(--primary); font-size: 1.2rem; }

        .btn { padding: 8px 14px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
        input[type="number"] { border: 1px solid #cbd5e1; border-radius: 6px; padding: 7px; width: 60px; }
    </style>
</head>
<body>

<div class="header-nav">
    <div class="filter-row">
        <label style="font-size: 13px; font-weight: bold; color: #64748b;">請選擇測驗單元：</label>
        <select id="unit-dropdown" class="unit-select" onchange="handleSelectChange(this.value)">
            </select>
    </div>
    
    <div class="tools-row">
        <span id="status-text" style="font-weight:bold; color:var(--primary); font-size:14px;">載入中...</span>
        <div>
            <button class="btn" onclick="toggleAllAns()" style="background:#64748b; font-size: 12px;">全顯/隱答案</button>
        </div>
        <div style="font-size: 13px;">
            跳題：<input type="number" id="jump-id" placeholder="No.">
            <button class="btn" onclick="jumpTo()" style="padding: 6px 10px;">Go</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="main-list"></div>
    <div id="pagination" style="text-align: center; margin-top: 25px; padding-bottom: 20px; display:none;">
        <button class="btn" onclick="changePage(-1)" style="width: 100px;">上一頁</button>
        <button class="btn" onclick="changePage(1)" style="width: 100px; margin-left:15px;">下一頁</button>
    </div>
</div>

<div class="float-btns">
    <button id="resume-btn" class="f-btn" onclick="goToLastBookmark()">續讀<br><span id="last-num"></span></button>
    <button id="top-btn" class="f-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>
</div>

<script src="quiz_data.js"></script>
<script>
    const UNIT_CONFIG = [
        [1, 222, "單元二：第三章 品質分析方法與應用"],
        [223, 402, "單元二：第二章 統計分析方法與應用"],
        [403, 598, "單元二：第一章 監造計畫與品質計畫指導"],
        [599, 649, "永續公共工程"],
        [650, 797, "單元一：第三章 公共工程履約管理"],
        [798, 1123, "單元一：第二章 公共工程管理相關法規概要"],
        [1124, 1221, "單元二：第六章 建築工程之界面整合"],
        [1222, 1382, "單元二：第五章 電梯設備工程品質管理"],
        [1383, 1652, "單元二：第四章 消防設備及空調設備工程品質管理實務"],
        [1653, 1820, "單元二：第三章 給排水衛生設備工程品質管理實務"],
        [1821, 2052, "單元二：第二章 弱電(含中央監控)設備工程品質管理實務"],
        [2053, 2194, "單元二：第一章 電氣設備工程品質管理實務"],
        [2195, 2385, "單元二：第六章 工程品質稽核"],
        [2386, 2606, "單元二：第五章 施工管制與檢驗"],
        [2607, 2836, "單元二：第四章 工程進料檢驗與管制"],
        [2837, 2866, "單元一：第一章 公共工程施工品質管理制度理念與導入"],
        [2867, 2878, "政府採購全生命週期概論"]
    ];

    let currentUnit = '全部';
    let startIdx = 0;
    let pageSize = 50;
    let allShow = false;
    let filteredData = [];

    window.onload = () => {
        if (typeof allQuestions === 'undefined') return;

        allQuestions.forEach(q => {
            const idNum = parseInt(q.id);
            const found = UNIT_CONFIG.find(u => idNum >= u[0] && idNum <= u[1]);
            q.unit = found ? found[2] : "其他";
        });

        // 生成下拉選單內容
        const dropdown = document.getElementById('unit-dropdown');
        const unitList = ['全部', ...UNIT_CONFIG.map(u => u[2])];
        dropdown.innerHTML = unitList.map(u => `<option value="${u}">${u}</option>`).join('');

        // 讀取書籤
        const savedId = localStorage.getItem('read_exact_id');
        if (savedId) {
            document.getElementById('resume-btn').style.display = 'block';
            document.getElementById('last-num').innerText = savedId;
        }

        updateFilteredData();
        render();
    };

    function handleSelectChange(val) {
        currentUnit = val;
        startIdx = 0;
        updateFilteredData();
        render();
        window.scrollTo(0, 0);
    }

    function updateFilteredData() {
        filteredData = currentUnit === '全部' ? allQuestions : allQuestions.filter(q => q.unit === currentUnit);
        document.getElementById('pagination').style.display = filteredData.length > pageSize ? 'block' : 'none';
    }

    function render() {
        const list = document.getElementById('main-list');
        const displayData = filteredData.slice(startIdx, startIdx + pageSize);
        
        document.getElementById('status-text').innerText = `${currentUnit} (${startIdx+1}~${Math.min(startIdx+pageSize, filteredData.length)})`;
        
        list.innerHTML = displayData.map((q, i) => `
            <div class="q-item" id="q-block-${q.id}" data-real-id="${q.id}" onclick="toggleAns('${q.id}')">
                <div class="q-meta">
                    <span>題號 ${q.id}</span>
                    <span>${q.unit}</span>
                </div>
                <span class="q-text">${q.q}</span>
                <div class="opt-list">
                    ${q.o.map(opt => `<span class="opt">${opt}</span>`).join('')}
                </div>
                <div class="ans-area ${allShow ? 'show' : ''}" id="ans-${q.id}">
                    💡 正確答案：(${q.a})
                </div>
            </div>
        `).join('');
    }

    function toggleAns(id) {
        document.getElementById(`ans-${id}`).classList.toggle('show');
    }

    function toggleAllAns() {
        allShow = !allShow;
        render();
    }

    function changePage(dir) {
        let next = startIdx + (dir * pageSize);
        if (next >= 0 && next < filteredData.length) {
            startIdx = next;
            render();
            window.scrollTo(0, 0);
        }
    }

    function jumpTo() {
        const val = parseInt(document.getElementById('jump-id').value);
        if (!val) return;
        
        const targetIdxInAll = allQuestions.findIndex(q => q.id == val);
        if (targetIdxInAll !== -1) {
            const targetQ = allQuestions[targetIdxInAll];
            currentUnit = targetQ.unit;
            document.getElementById('unit-dropdown').value = currentUnit;
            updateFilteredData();
            
            const idxInFiltered = filteredData.findIndex(q => q.id == val);
            startIdx = Math.floor(idxInFiltered / pageSize) * pageSize;
            
            render();
            setTimeout(() => {
                const el = document.getElementById(`q-block-${val}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        } else {
            alert("找不到該題號");
        }
    }

    window.onscroll = () => {
        const items = document.querySelectorAll('.q-item');
        for (let item of items) {
            const r = item.getBoundingClientRect();
            if (r.top >= 0 && r.top <= 200) {
                const id = item.getAttribute('data-real-id');
                localStorage.setItem('read_exact_id', id);
                localStorage.setItem('read_start_idx', startIdx);
                break;
            }
        }
    };

    function goToLastBookmark() {
        const savedId = localStorage.getItem('read_exact_id');
        if (savedId) {
            document.getElementById('jump-id').value = savedId;
            jumpTo();
        }
    }
</script>
</body>
</html>
