<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程題庫-全功能整合版</title>
    <style>
        :root { --primary: #1e40af; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; min-height: 100vh; padding: 20px; padding-bottom: 100px; }
        
        /* 置頂控制列 */
        .header-nav { position: sticky; top: 0; background: white; padding: 10px; z-index: 1000; border-bottom: 2px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-section { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; justify-content: center; }
        .unit-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 13px; }
        .unit-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .tools-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 10px; }
        
        /* 題目樣式 */
        .q-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; margin-bottom: 15px; cursor: pointer; }
        .q-meta { color: #64748b; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .q-text { font-weight: bold; font-size: 1.1rem; line-height: 1.5; margin-bottom: 12px; display: block; }
        .opt { display: block; margin-bottom: 6px; color: #475569; padding: 4px 8px; border-radius: 4px; }
        
        /* 答案區域 */
        .ans-area { margin-top: 12px; padding: 12px; background: #f0fdf4; border-radius: 8px; color: #166534; font-weight: bold; border-left: 5px solid #22c55e; display: none; }
        .ans-area.show { display: block; }

        /* 浮動按鈕 */
        .float-btns { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .f-btn { width: 55px; height: 55px; border-radius: 50%; border: none; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #resume-btn { background: var(--accent); display: none; font-size: 0.8rem; }
        #top-btn { background: var(--primary); font-size: 1.2rem; }

        .btn { padding: 6px 12px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="header-nav">
    <div class="filter-section" id="unit-btns"></div>
    
    <div class="tools-row">
        <span id="status-text" style="font-weight:bold; color:var(--primary); font-size:14px;">載入中...</span>
        <div>
            <button class="btn" onclick="toggleAllAns()" style="background:#64748b;">全顯/隱藏答案</button>
        </div>
        <div style="font-size: 14px;">
            跳題：<input type="number" id="jump-id" style="width:50px;" placeholder="No.">
            <button class="btn" onclick="jumpTo()">Go</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="main-list"></div>
    <div id="pagination" style="text-align: center; margin-top: 20px;">
        <button class="btn" onclick="changePage(-1)">上一頁</button>
        <button class="btn" onclick="changePage(1)" style="margin-left:10px;">下一頁</button>
    </div>
</div>

<div class="float-btns">
    <button id="resume-btn" class="f-btn" onclick="goToLastBookmark()">續讀<br><span id="last-num"></span></button>
    <button id="top-btn" class="f-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>
</div>

<script src="quiz_data.js"></script>
<script>
    let currentUnit = '全部';
    let startIdx = 0;
    let pageSize = 50;
    let allShow = false;
    let filteredData = [];

    window.onload = () => {
        if (typeof allQuestions === 'undefined') return;
        
        // 初始化單元按鈕 (原本的功能)
        const units = ['全部', ...new Set(allQuestions.map(q => q.unit))];
        document.getElementById('unit-btns').innerHTML = units.map(u => 
            `<button class="unit-btn ${u==='全部'?'active':''}" onclick="filterUnit('${u}', this)">${u}</button>`
        ).join('');

        // 讀取進度
        const savedIdx = localStorage.getItem('read_start_idx');
        const savedId = localStorage.getItem('read_exact_id');
        if (savedIdx) {
            startIdx = parseInt(savedIdx);
            document.getElementById('resume-btn').style.display = 'block';
            document.getElementById('last-num').innerText = savedId || "";
        }

        updateFilteredData();
        render();
    };

    function filterUnit(u, btn) {
        currentUnit = u;
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        startIdx = 0; // 切換單元從頭開始
        updateFilteredData();
        render();
        window.scrollTo(0,0);
    }

    function updateFilteredData() {
        filteredData = currentUnit === '全部' ? allQuestions : allQuestions.filter(q => q.unit === currentUnit);
    }

    function render() {
        const list = document.getElementById('main-list');
        const displayData = filteredData.slice(startIdx, startIdx + pageSize);
        
        document.getElementById('status-text').innerText = `${currentUnit} (${startIdx+1}~${Math.min(startIdx+pageSize, filteredData.length)})`;
        
        list.innerHTML = displayData.map((q, i) => `
            <div class="q-item" id="q-block-${startIdx + i}" data-real-id="${q.id}" onclick="toggleAns(${i})">
                <div class="q-meta">
                    <span>題號 ${q.id}</span>
                    <span>${q.unit}</span>
                </div>
                <span class="q-text">${q.q}</span>
                <div class="opt-list">
                    ${q.o.map(opt => `<span class="opt">${opt}</span>`).join('')}
                </div>
                <div class="ans-area ${allShow ? 'show' : ''}" id="ans-${i}">
                    💡 正確答案：(${q.a})
                </div>
            </div>
        `).join('');
        
        localStorage.setItem('read_start_idx', startIdx);
    }

    function toggleAns(i) {
        document.getElementById(`ans-${i}`).classList.toggle('show');
    }

    function toggleAllAns() {
        allShow = !allShow;
        render();
    }

    function changePage(dir) {
        let next = startIdx + (dir * pageSize);
        if (next >= 0 && next < filteredData.length) {
            startIdx = next;
            render();
            window.scrollTo(0, 0);
        }
    }

    function jumpTo() {
        const val = parseInt(document.getElementById('jump-id').value);
        const targetIdx = allQuestions.findIndex(q => q.id == val);
        if (targetIdx !== -1) {
            currentUnit = '全部'; // 跳轉時切換到全部以確保找得到
            document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.unit-btn')[0].classList.add('active');
            updateFilteredData();
            
            startIdx = Math.floor(targetIdx / pageSize) * pageSize;
            render();
            setTimeout(() => {
                const el = document.querySelector(`[data-real-id="${val}"]`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        } else {
            alert("找不到該題號");
        }
    }

    window.onscroll = () => {
        const items = document.querySelectorAll('.q-item');
        for (let item of items) {
            const r = item.getBoundingClientRect();
            if (r.top >= 0 && r.top <= 150) {
                const id = item.getAttribute('data-real-id');
                localStorage.setItem('read_exact_id', id);
                break;
            }
        }
    };

    function goToLastBookmark() {
        const savedId = localStorage.getItem('read_exact_id');
        if (savedId) jumpToTargetId(savedId);
    }

    function jumpToTargetId(id) {
        document.getElementById('jump-id').value = id;
        jumpTo();
    }
</script>
</body>
</html>
