<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程題庫-讀題與解析模式</title>
    <style>
        :root { --primary: #1e40af; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; min-height: 100vh; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .filter-section { position: sticky; top: 0; background: white; padding: 10px; z-index: 1000; border-bottom: 2px solid #e2e8f0; text-align: center; }
        .unit-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 14px; margin: 3px; }
        .unit-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .q-item { margin-bottom: 30px; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .q-meta { margin-bottom: 12px; font-size: 13px; color: #64748b; }
        .q-id { background: #eff6ff; color: var(--accent); padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-right: 10px; }
        .q-text { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 15px; }
        .opt-box { padding: 10px 15px; border-radius: 6px; border: 1px solid #f1f5f9; color: #475569; margin-bottom: 5px; }
        .opt-box.is-correct { background: #ecfdf5; border-color: #10b981; color: #065f46; font-weight: bold; position: relative; }
        .opt-box.is-correct::after { content: "✓ 正確選項"; position: absolute; right: 15px; font-size: 12px; }
        .ai-note { margin-top: 15px; padding: 12px; background: #fff7ed; border-left: 4px solid #f97316; font-size: 14px; color: #7c2d12; }
    </style>
</head>
<body>
<div class="container">
    <div class="filter-section"><div id="unit-btns"></div></div>
    <div id="read-list"></div>
</div>
<script src="quiz_data.js"></script>
<script>
    let currentUnit = '全部';
    const ansMap = {"A":0, "B":1, "C":2, "D":3};
    window.onload = () => {
        const units = ['全部', ...new Set(allQuestions.map(q => q.unit))];
        document.getElementById('unit-btns').innerHTML = units.map(u => 
            `<button class="unit-btn ${u==='全部'?'active':''}" onclick="filter('${u}', this)">${u}</button>`
        ).join('');
        render();
    };
    function filter(u, btn) {
        currentUnit = u;
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
        window.scrollTo({top: 0});
    }
    function render() {
        const data = currentUnit === '全部' ? allQuestions : allQuestions.filter(q => q.unit === currentUnit);
        document.getElementById('read-list').innerHTML = data.map(q => `
            <div class="q-item">
                <div class="q-meta"><span class="q-id">題號 ${q.id}</span><span>${q.unit}</span></div>
                <div class="q-text">${q.q}</div>
                <div>${q.o.map((opt, i) => `<div class="opt-box ${i === ansMap[q.a] ? 'is-correct' : ''}">${opt}</div>`).join('')}</div>
                ${q.note ? `<div class="ai-note"><b>💡 AI 解析：</b>${q.note}</div>` : ''}
            </div>
        `).join('');
    }
</script>
</body>
</html>
