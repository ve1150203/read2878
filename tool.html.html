<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>題庫自動分類工具</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        .box { border: 2px dashed #ccc; padding: 20px; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; margin-top: 10px; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🛠️ 題庫分類與解析拼裝器 (免安裝版)</h2>
    <div class="box">
        <p>1. 請點擊下方按鈕，選擇您的 <b>quiz_data.js</b> 檔案</p>
        <input type="file" id="fileInput" accept=".js">
    </div>
    <div class="box">
        <p>2. 點擊開始拼裝</p>
        <button onclick="processData()">開始拼裝並下載新檔</button>
    </div>
    <p id="status"></p>

    <script>
        // 您的單元區間清單
        const UNIT_RANGES = [
            [1, 222, "單元二：第三章 品質分析方法與應用"],
            [223, 402, "單元二：第二章 統計分析方法與應用"],
            [403, 598, "單元二：第一章 監造計畫與品質計畫指導"],
            [599, 649, "永續公共工程"],
            [650, 797, "單元一：第三章 公共工程履約管理"],
            [798, 1123, "單元一：第二章 公共工程管理相關法規概要"],
            [1124, 1221, "單元二：第六章 建築工程之界面整合"],
            [1222, 1382, "單元二：第五章 電梯設備工程品質管理"],
            [1383, 1652, "單元二：第四章 消防設備及空調設備工程品質管理實務"],
            [1653, 1820, "單元二：第三章 給排水衛生設備工程品質管理實務"],
            [1821, 2052, "單元二：第二章 弱電(含中央監控)設備工程品質管理實務"],
            [2053, 2194, "單元二：第一章 電氣設備工程品質管理實務"],
            [2195, 2385, "單元二：第六章 工程品質稽核"],
            [2386, 2606, "單元二：第五章 施工管制與檢驗"],
            [2607, 2836, "單元二：第四章 工程進料檢驗與管制"],
            [2837, 2866, "單元一：第一章 公共工程施工品質管理制度理念與導入"],
            [2867, 2878, "政府採購全生命週期概論"]
        ];

        function getUnit(qid) {
            for (let [start, end, name] of UNIT_RANGES) {
                if (qid >= start && qid <= end) return name;
            }
            return "其他";
        }

        function getNote(q) {
            if (q.includes("QC") || q.includes("手法")) return "精簡解析：N7偏規劃(Plan)，Q7偏數據(Check)分析。";
            if (q.includes("採購")) return "精簡解析：遵循採購法公平公開原則，注意金額級距規定。";
            if (q.includes("天") || q.includes("日")) return "精簡解析：注意法定天數計算（日曆天或工作天）。";
            return "精簡解析：掌握正確選項之定義與規範數值，排除干擾項。";
        }

        function processData() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { alert("請先選擇檔案！"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                let content = e.target.result;
                try {
                    // 找出 JSON 陣列
                    let start = content.indexOf('[');
                    let end = content.lastIndexOf(']') + 1;
                    let questions = JSON.parse(content.substring(start, end));

                    // 拼裝
                    questions.forEach(q => {
                        let idNum = parseInt(q.id);
                        q.unit = getUnit(idNum);
                        q.note = getNote(q.q);
                    });

                    // 輸出檔案
                    let result = "const allQuestions = " + JSON.stringify(questions, null, 2) + ";";
                    let blob = new Blob([result], {type: "text/javascript"});
                    let url = URL.createObjectURL(blob);
                    let a = document.createElement('a');
                    a.href = url;
                    a.download = "quiz_data.js";
                    a.click();
                    document.getElementById('status').innerText = "✅ 拼裝完成並已啟動下載！";
                } catch (err) {
                    alert("檔案處理出錯，請確認 quiz_data.js 格式正確。");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
